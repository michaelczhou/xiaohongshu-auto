<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书自动发布系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #ff6b6b; margin-bottom: 20px; font-size: 24px; }
        h2 { color: #333; margin-bottom: 16px; font-size: 18px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 500; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        textarea { min-height: 120px; resize: vertical; }
        button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,107,107,0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .status-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            width: 0%;
            transition: width 0.3s;
        }
        .task-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .task-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #ff6b6b;
        }
        .task-item.success { border-left-color: #51cf66; }
        .task-item.failed { border-left-color: #ff6b6b; }
        .task-item.pending { border-left-color: #fcc419; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: white;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .tag {
            display: inline-block;
            background: #ffe3e3;
            color: #ff6b6b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧：配置和输入 -->
        <div class="panel">
            <h1>📕 小红书自动发布系统</h1>
            
            <h2>⚙️ 配置</h2>
            <div class="form-group">
                <label>LLM API Key</label>
                <input type="password" id="llm_api_key" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>LLM Base URL</label>
                <input type="text" id="llm_base_url" value="https://api.openai.com/v1">
            </div>
            <div class="form-group">
                <label>模型</label>
                <input type="text" id="llm_model" value="gpt-4o">
            </div>
            <div class="form-group">
                <label>小红书 MCP 服务地址</label>
                <input type="text" id="xhs_mcp_url" value="http://localhost:18060/mcp">
            </div>
            <button onclick="saveConfig()" class="btn-secondary">💾 保存配置</button>
            
            <hr style="margin: 24px 0; border: none; border-top: 1px solid #eee;">
            
            <h2>✨ 创建内容</h2>
            <div class="form-group">
                <label>主题</label>
                <textarea id="topic" placeholder="输入要创作的主题，例如：生成式 AI 优先级悖论解析"></textarea>
            </div>
            <button onclick="generateContent()" id="generateBtn">🚀 生成并发布</button>
            
            <div id="statusCard" class="status-card hidden">
                <div id="statusText">准备中...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>
        
        <!-- 右侧：历史和统计 -->
        <div class="panel">
            <h2>📊 统计</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">总计</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #51cf66, #37b24d);">
                    <div class="stat-value" id="statSuccess">0</div>
                    <div class="stat-label">成功</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #ff6b6b, #fa5252);">
                    <div class="stat-value" id="statFailed">0</div>
                    <div class="stat-label">失败</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #fcc419, #f08c00);">
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label">进行中</div>
                </div>
            </div>
            
            <h2>📝 历史记录</h2>
            <div class="task-list" id="taskList">
                <div style="text-align: center; color: #999; padding: 40px;">暂无记录</div>
            </div>
        </div>
    </div>
    
    <script>
        // 加载配置
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('llm_base_url').value = data.llm_base_url || '';
                    document.getElementById('llm_model').value = data.llm_model || '';
                    document.getElementById('xhs_mcp_url').value = data.xhs_mcp_url || '';
                }
            } catch (e) { console.error(e); }
        }
        
        // 保存配置
        async function saveConfig() {
            const config = {
                llm_api_key: document.getElementById('llm_api_key').value,
                llm_base_url: document.getElementById('llm_base_url').value,
                llm_model: document.getElementById('llm_model').value,
                xhs_mcp_url: document.getElementById('xhs_mcp_url').value
            };
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                });
                const data = await res.json();
                alert(data.message || '配置已保存');
            } catch (e) { alert('保存失败：' + e.message); }
        }
        
        // 生成内容
        async function generateContent() {
            const topic = document.getElementById('topic').value.trim();
            if (!topic) { alert('请输入主题'); return; }
            
            const btn = document.getElementById('generateBtn');
            const statusCard = document.getElementById('statusCard');
            const statusText = document.getElementById('statusText');
            const progressFill = document.getElementById('progressFill');
            
            btn.disabled = true;
            statusCard.classList.remove('hidden');
            progressFill.style.width = '0%';
            
            try {
                // 模拟进度
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    progressFill.style.width = Math.min(progress, 90) + '%';
                    statusText.innerText = '正在生成内容...';
                }, 500);
                
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({topic})
                });
                const data = await res.json();
                
                clearInterval(interval);
                progressFill.style.width = '100%';
                
                if (data.success) {
                    statusText.innerText = '✅ 发布成功！';
                    loadHistory();
                    loadStatistics();
                } else {
                    statusText.innerText = '❌ 失败：' + (data.error || '未知错误');
                }
            } catch (e) {
                statusText.innerText = '❌ 错误：' + e.message;
            }
            
            btn.disabled = false;
        }
        
        // 加载历史
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                const list = document.getElementById('taskList');
                if (data.history && data.history.length > 0) {
                    list.innerHTML = data.history.map(task => `
                        <div class="task-item ${task.status || 'pending'}">
                            <div><strong>${task.topic || '未知主题'}</strong></div>
                            <div style="font-size: 12px; color: #999; margin-top: 4px;">
                                ${task.created_at ? new Date(task.created_at).toLocaleString() : ''}
                            </div>
                            ${task.content ? `<div style="margin-top: 8px;"><span class="tag">${(task.content.title || '').substring(0, 20)}</span></div>` : ''}
                        </div>
                    `).join('');
                }
            } catch (e) { console.error(e); }
        }
        
        // 加载统计
        async function loadStatistics() {
            try {
                const res = await fetch('/api/statistics');
                const data = await res.json();
                if (data.statistics) {
                    document.getElementById('statTotal').textContent = data.statistics.total || 0;
                    document.getElementById('statSuccess').textContent = data.statistics.success || 0;
                    document.getElementById('statFailed').textContent = data.statistics.failed || 0;
                    document.getElementById('statPending').textContent = data.statistics.pending || 0;
                }
            } catch (e) { console.error(e); }
        }
        
        // 初始化
        loadConfig();
        loadHistory();
        loadStatistics();
    </script>
</body>
</html>
